<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>

  <body class="bg-slate-100">
    <div class="max-w-5xl mx-auto p-6">
      <!-- Header -->
      <div class="mb-8">
        <h1 class="font-bold text-4xl text-slate-800">💰 Expense Tracker</h1>

        <p class="text-slate-500 mt-2">Manage your money smarter</p>
      </div>
      <!-- Header Ends -->

      <!-- Balance Card -->
      <div
        class="bg-gradient-to-r from-blue-600 to-blue-500 text-white rounded-3xl shadow-xl p-8 mb-6"
      >
        <p class="text-lg opacity-90">Total Balance</p>

        <h2 id="balanceAmt" class="text-5xl font-bold mt-2">Rs. 25,000</h2>
      </div>
      <!-- Balance Card Ends -->

      <!-- Income Expense -->
      <div class="grid md:grid-cols-2 gap-6 mb-6">
        <div class="bg-white rounded-3xl shadow-lg p-6 border">
          <p class="text-slate-500">Income</p>

          <h3 id="incomeAmt" class="text-green-600 font-bold text-3xl mt-2">Rs. 20,000</h3>
        </div>

        <div class="bg-white rounded-3xl shadow-lg p-6 border">
          <p class="text-slate-500">Expense</p>

          <h3 id="expenseAmt" class="text-red-600 font-bold text-3xl mt-2">Rs. 5,000</h3>
        </div>
      </div>
      <!-- Income Expense Ends -->

      <!-- Add Transaction + Recent Transactions -->
      <div class="grid lg:grid-cols-2 gap-6">
        <!-- Add Transaction -->
        <div class="bg-white rounded-3xl shadow-lg p-6">
          <h3 class="text-2xl font-semibold mb-5">Add Transaction</h3>

          <form class="space-y-4">
            <input
              id="title"
              type="text"
              placeholder="Transaction Title"
              class="w-full border border-slate-300 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500"
            />

            <input
              id="amount"
              type="number"
              placeholder="Amount"
              class="w-full border border-slate-300 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500"
            />

            <select
              id="category"
              class="w-full border border-slate-300 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500"
            >
              <option>Select Category</option>
              <option>Food</option>
              <option>Transport</option>
              <option>Shopping</option>
              <option>Salary</option>
            </select>

            <div class="flex gap-6">
              <label class="flex items-center gap-2">
                <input type="radio" name="type" value="Income" />
                Income
              </label>

              <label class="flex items-center gap-2">
                <input type="radio" name="type" value="Expense" />
                Expense
              </label>
            </div>

            <button
              id="addBtn"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-medium transition"
            >
              Add Transaction
            </button>
          </form>
        </div>
        <!-- Add Transaction Ends -->

        <!-- Recent Transactions -->
        <div class="bg-white rounded-3xl shadow-lg p-6">
          <h2 class="text-2xl font-semibold mb-5">Recent Transactions</h2>

          <div id="transactionList" class="space-y-3"></div>
        </div>
        <!-- Recent Transactions Ends -->
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
